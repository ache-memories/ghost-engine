<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEOGhostEngine | Original Stable</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #00ff88;
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --border-color: #30363d;
            --text-main: #c9d1d9;
        }

        body {
            background: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 30px;
            border-radius: 15px;
            width: 100%;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        input {
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            background: #0d1117;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: white;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            background: var(--primary-color);
            border: none;
            border-radius: 8px;
            color: #0d1117;
            font-weight: bold;
            cursor: pointer;
        }

        #result {
            margin-top: 20px;
            text-align: left;
            font-size: 0.9rem;
            word-wrap: break-word;
            display: none;
        }
    </style>
</head>
<body>

<div class="card">
    <div style="font-size: 2.5rem;">👻</div>
    <h1 style="margin: 10px 0;">SEOGhostEngine</h1>
    <input type="text" id="urlInput" placeholder="https://example.com">
    <button onclick="fetchSEO()">Extract Metadata</button>
    <div id="result"></div>
</div>

<script>
    async function fetchSEO() {
        const url = document.getElementById('urlInput').value;
        const resultDiv = document.getElementById('result');
        if(!url) return alert('Please enter URL');

        resultDiv.style.display = 'block';
        resultDiv.innerHTML = 'Loading...';

        try {
            const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`);
            const data = await res.json();
            const parser = new DOMParser();
            const doc = parser.parseFromString(data.contents, 'text/html');

            const title = doc.querySelector('title')?.innerText || 'No Title';
            const desc = doc.querySelector('meta[name="description"]')?.content || 'No Description';

            resultDiv.innerHTML = `
                <p><strong>Title:</strong> <span style="color:var(--primary-color)">${title}</span></p>
                <p><strong>Description:</strong> ${desc}</p>
            `;
        } catch (e) {
            resultDiv.innerHTML = 'Error fetching data.';
        }
    }
</script>

</body>
</html>
