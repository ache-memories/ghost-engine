<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SEOGhostEngine | Pro</title>
    <style>
        body { background: #0d1117; color: #c9d1d9; font-family: monospace; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: #161b22; border: 1px solid #30363d; padding: 30px; border-radius: 12px; width: 450px; text-align: center; border-top: 4px solid #238636; }
        input { width: 80%; padding: 12px; background: #010409; border: 1px solid #30363d; color: white; border-radius: 6px; margin-bottom: 15px; outline: none; }
        button { width: 85%; padding: 12px; background: #238636; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        #log { margin-top: 20px; text-align: left; background: #010409; padding: 15px; border-radius: 6px; color: #7ee787; min-height: 100px; white-space: pre-wrap; border: 1px solid #30363d; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="color: #58a6ff;">👻 Ghost Engine Audit</h2>
        <input type="text" id="target" placeholder="https://example.com">
        <button onclick="run()">ANALYZE URL</button>
        <div id="log">> System Online. Ready.</div>
    </div>

    <script>
        async function run() {
            const url = document.getElementById('target').value;
            const log = document.getElementById('log');
            // رابط الـ Proxy الخاص بك
            const proxy = "https://script.google.com/macros/s/AKfycbxzv-sQ6KUYWAUYR4cWsAKBxQe15oXMF00XOI08ZCyL1Ru_27EJIKKjMJwLs3phz3Y5/exec";
            
            if(!url) { log.innerHTML = "[!] Enter URL"; return; }
            log.innerHTML = "[*] Scanning " + url + "...";
            
            try {
                const res = await fetch(proxy + "?url=" + encodeURIComponent(url));
                const text = await res.text();
                const doc = new DOMParser().parseFromString(text, "text/html");
                const title = doc.querySelector('title') ? doc.querySelector('title').innerText : "No Title Found";
                log.innerHTML = "[✓] SUCCESS\n\nPage Title: " + title;
            } catch(e) {
                log.innerHTML = "[!] CONNECTION FAILED\nGo to Google Script and click 'Allow Access' if prompted.";
            }
        }
    </script>
</body>
</html>
