<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SEOGhostEngine | Stable v16.0</title>
    <style>
        body { background: #0d1117; color: #c9d1d9; font-family: monospace; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: #161b22; border: 1px solid #30363d; padding: 30px; border-radius: 12px; width: 450px; text-align: center; border-top: 4px solid #238636; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        input { width: 85%; padding: 12px; background: #010409; border: 1px solid #30363d; color: white; border-radius: 6px; margin-bottom: 15px; outline: none; }
        button { width: 90%; padding: 12px; background: #238636; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        #log { margin-top: 20px; text-align: left; background: #010409; padding: 15px; border-radius: 6px; color: #7ee787; min-height: 100px; white-space: pre-wrap; border: 1px solid #30363d; font-size: 13px; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="color: #58a6ff;">👻 Ghost Engine Audit</h2>
        <input type="text" id="target" placeholder="https://example.com">
        <button onclick="runAudit()">START ANALYSIS</button>
        <div id="log">> System Online. Ready.</div>
    </div>

    <script>
        async function runAudit() {
            const url = document.getElementById('target').value.trim();
            const log = document.getElementById('log');
            // رابط الـ Proxy الذي أرسلته أنت ويعمل الآن
            const proxy = "https://script.google.com/macros/s/AKfycbxzv-sQ6KUYWAUYR4cWsAKBxQe15oXMF00XOI08ZCyL1Ru_27EJIKKjMJwLs3phz3Y5/exec";
            
            if(!url) { log.innerHTML = "[!] Enter URL"; return; }
            log.innerHTML = "[*] Requesting data for: " + url;
            
            try {
                // استخدام الرابط المباشر مع التعديل لضمان عدم حدوث Error: No URL
                const response = await fetch(proxy + "?url=" + encodeURIComponent(url));
                const htmlText = await response.text();
                
                if (htmlText.includes("Error")) {
                    log.innerHTML = "[!] Proxy Error: " + htmlText;
                } else {
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(htmlText, "text/html");
                    const title = doc.querySelector('title') ? doc.querySelector('title').innerText : "No Title Found";
                    log.innerHTML = "[✓] ANALYSIS SUCCESSFUL\n\nPage Title: " + title;
                }
            } catch(e) {
                log.innerHTML = "[!] CONNECTION FAILED\nCheck if you are logged into Google in this browser.";
            }
        }
    </script>
</body>
</html>
