<script>
async function runAudit() {
    const url = document.getElementById('target').value.trim();
    const log = document.getElementById('log');
    // ضع رابط الـ exec الجديد هنا
    const proxy = "https://script.google.com/macros/s/AKfycbxzv-sQ6KUYWAUYR4cWsAKBxQe15oXMF00XOI08ZCyL1Ru_27EJIKKjMJwLs3phz3Y5/exec";
    
    if(!url) return;
    log.innerHTML = "[*] Connecting to Proxy...";
    
    try {
        const response = await fetch(proxy + "?url=" + encodeURIComponent(url));
        const text = await response.text();
        
        const doc = new DOMParser().parseFromString(text, "text/html");
        const title = doc.querySelector('title') ? doc.querySelector('title').innerText : "No Title Found";
        
        log.innerHTML = "[✓] SUCCESS\n\nTitle: " + title;
    } catch(e) {
        log.innerHTML = "[!] STILL BLOCKED\n\nFix: Open the proxy link in a new tab once, then come back here.";
    }
}
</script>
