<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEOGhostEngine | Ultra Stable</title>
    <style>
        body { background: #0d1117; color: #c9d1d9; font-family: monospace; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: #161b22; border: 1px solid #30363d; padding: 30px; border-radius: 12px; width: 450px; text-align: center; border-top: 4px solid #238636; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        input { width: 85%; padding: 12px; background: #010409; border: 1px solid #30363d; color: white; border-radius: 6px; margin-bottom: 15px; outline: none; }
        button { width: 90%; padding: 12px; background: #238636; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background: #2ea043; transform: scale(1.02); }
        #log { margin-top: 20px; text-align: left; background: #010409; padding: 15px; border-radius: 6px; color: #7ee787; min-height: 120px; white-space: pre-wrap; border: 1px solid #30363d; font-size: 13px; line-height: 1.5; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="color: #58a6ff;">👻 Ghost Engine Audit</h2>
        <input type="text" id="target" placeholder="https://example.com" value="https://qesset.net/">
        <button onclick="runAudit()">START ANALYSIS</button>
        <div id="log">> System Online. Ready for Scan.</div>
    </div>

    <script>
        async function runAudit() {
            const url = document.getElementById('target').value.trim();
            const log = document.getElementById('log');
            if(!url) return;

            log.innerHTML = "[*] Attempting to bypass CORS...\n[*] Fetching data for: " + url;

            // استخدام بروكسي بديل واكثر استقرارا
            const proxyUrl = "https://corsproxy.io/?" + encodeURIComponent(url);

            try {
                const response = await fetch(proxyUrl);
                const html = await response.text();
                
                if (html.length < 100) throw new Error("Empty Response");

                const parser = new DOMParser();
                const doc = parser.parseFromString(html, "text/html");
                
                const title = doc.querySelector('title')?.innerText || "No Title Found";
                const desc = doc.querySelector('meta[name="description"]')?.content || "No Description Found";
                const h1 = doc.querySelector('h1')?.innerText || "No H1 Found";

                log.innerHTML = "[✓] ANALYSIS SUCCESSFUL\n" + 
                                "====================================\n" +
                                "● Title: " + title + "\n" +
                                "● H1 Tag: " + h1 + "\n" +
                                "● Desc: " + desc.substring(0, 80) + "...\n" +
                                "====================================";
            } catch(e) {
                log.innerHTML = "[!] PRIMARY PROXY FAILED.\n[*] Trying Backup Proxy...";
                // محاولة اخيرة ببروكسي AllOrigins لو فشل الاول
                try {
                    const res2 = await fetch("https://api.allorigins.win/get?url=" + encodeURIComponent(url));
                    const data2 = await res2.json();
                    const doc2 = new DOMParser().parseFromString(data2.contents, "text/html");
                    log.innerHTML = "[✓] SUCCESS (via Backup)\nTitle: " + (doc2.querySelector('title')?.innerText || "Found");
                } catch(err) {
                    log.innerHTML = "[!] CRITICAL ERROR: All Proxies Blocked.\nCheck if the target website prevents scraping.";
                }
            }
        }
    </script>
</body>
</html>
