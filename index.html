<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEOGhostEngine | Stable</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #161b22;
            border: 1px solid #30363d;
            padding: 30px;
            border-radius: 12px;
            width: 100%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }
        h1 { color: #00ff88; margin-bottom: 20px; font-size: 1.8rem; }
        input {
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #30363d;
            background: #0d1117;
            color: white;
            margin-bottom: 15px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #00ff88;
            color: #0d1117;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }
        button:hover { opacity: 0.9; }
        #result {
            margin-top: 20px;
            text-align: left;
            font-size: 0.9rem;
            line-height: 1.5;
            word-wrap: break-word;
        }
    </style>
</head>
<body>

<div class="container">
    <div style="font-size: 2.5rem;">👻</div>
    <h1>SEOGhostEngine</h1>
    <input type="text" id="urlInput" placeholder="Enter URL (e.g., https://example.com)">
    <button onclick="fetchSEO()">Extract Metadata</button>
    <div id="result"></div>
</div>

<script>
    async function fetchSEO() {
        const url = document.getElementById('urlInput').value;
        const resultDiv = document.getElementById('result');
        if (!url) return alert('Please enter a URL');

        resultDiv.innerHTML = '<p style="color: #58a6ff;">Extracting... Please wait.</p>';

        try {
            // This is the simplest and most stable proxy connection
            const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`);
            const data = await response.json();
            
            const parser = new DOMParser();
            const doc = parser.parseFromString(data.contents, 'text/html');

            const title = doc.querySelector('title')?.innerText || 'No Title Found';
            const description = doc.querySelector('meta[name="description"]')?.getAttribute('content') || 'No Description Found';

            resultDiv.innerHTML = `
                <p><strong>Title:</strong> <span style="color: #00ff88;">${title}</span></p>
                <p><strong>Description:</strong> ${description}</p>
            `;
        } catch (error) {
            resultDiv.innerHTML = '<p style="color: #ff4a4a;">Error: Could not reach the site. Try another URL.</p>';
        }
    }
</script>

</body>
</html>
